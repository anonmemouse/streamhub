<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub — webOS Streaming Launcher</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-deep:        #020408;
            --bg-base:        #060d16;
            --bg-surface:     #0b1523;
            --bg-card:        #0e1c2e;
            --bg-card-hover:  #111f33;
            --bg-glass:       rgba(14, 28, 46, 0.7);

            --neon-cyan:      #00f5ff;
            --neon-blue:      #0080ff;
            --neon-purple:    #7b2fff;
            --neon-pink:      #ff007a;
            --neon-gold:      #ffd700;
            --neon-green:     #00ff88;

            --text-primary:   #e8f4ff;
            --text-secondary: #8bacc8;
            --text-muted:     #4a6a8a;

            --border-dim:     rgba(0, 245, 255, 0.08);
            --border-glow:    rgba(0, 245, 255, 0.25);
            --border-hot:     rgba(0, 245, 255, 0.6);

            --glow-cyan:      0 0 20px rgba(0, 245, 255, 0.4), 0 0 60px rgba(0, 245, 255, 0.15);
            --glow-blue:      0 0 20px rgba(0, 128, 255, 0.4), 0 0 60px rgba(0, 128, 255, 0.15);
            --glow-purple:    0 0 20px rgba(123, 47, 255, 0.4), 0 0 60px rgba(123, 47, 255, 0.15);
            --glow-pink:      0 0 20px rgba(255, 0, 122, 0.4);

            --font-display:   'Orbitron', monospace;
            --font-body:      'Inter', sans-serif;

            --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
            --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;

            --r-sm: 4px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px; --r-full: 9999px;

            --dur-fast: 120ms; --dur-normal: 250ms; --dur-slow: 400ms;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg-deep);
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse 80% 50% at 10% 0%, rgba(0,128,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 100%, rgba(123,47,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,245,255,0.03) 0%, transparent 70%),
                var(--bg-base);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 2px; opacity: 0.5; }

        .font-display { font-family: var(--font-display); letter-spacing: 0.05em; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 8px 16px;
            border-radius: var(--r-md);
            font-family: var(--font-body);
            font-size: 13px; font-weight: 600;
            cursor: pointer;
            transition: all var(--dur-normal) var(--ease);
            border: 1px solid transparent;
            text-decoration: none;
            position: relative; overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            opacity: 0; transition: opacity var(--dur-fast);
        }
        .btn:hover::before { opacity: 1; }

        .btn-primary {
            background: linear-gradient(135deg, rgba(0,245,255,0.15) 0%, rgba(0,128,255,0.1) 100%);
            border-color: var(--border-glow);
            color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0,245,255,0.1);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, rgba(0,245,255,0.25) 0%, rgba(0,128,255,0.2) 100%);
            border-color: var(--border-hot);
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        .btn-ghost {
            background: transparent;
            border-color: var(--border-dim);
            color: var(--text-secondary);
        }
        .btn-ghost:hover {
            border-color: var(--border-glow);
            color: var(--text-primary);
            background: rgba(0,245,255,0.05);
        }

        .btn-watch {
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 100%);
            border: none;
            color: var(--bg-deep);
            font-weight: 700;
            font-size: 12px;
            padding: 7px 14px;
            border-radius: var(--r-sm);
            box-shadow: 0 0 16px rgba(0,245,255,0.3);
            cursor: pointer;
            transition: all var(--dur-normal) var(--ease);
        }
        .btn-watch:hover {
            box-shadow: 0 0 28px rgba(0,245,255,0.6);
            transform: translateY(-2px) scale(1.02);
        }

        .btn-fav {
            background: transparent;
            border: 1px solid rgba(255,0,122,0.25);
            color: var(--text-muted);
            width: 32px; height: 32px;
            border-radius: var(--r-sm);
            display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all var(--dur-fast);
            font-size: 14px;
        }
        .btn-fav:hover, .btn-fav.active {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: var(--glow-pink);
        }

        .input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(11,21,35,0.8);
            border: 1px solid var(--border-dim);
            border-radius: var(--r-md);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 13px;
            backdrop-filter: blur(10px);
            transition: all var(--dur-fast);
            outline: none;
        }
        .input::placeholder { color: var(--text-muted); }
        .input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 0 3px rgba(0,245,255,0.08), 0 0 20px rgba(0,245,255,0.1);
            background: rgba(11,21,35,0.95);
        }

        .header {
            position: sticky; top: 0; z-index: 200;
            background: rgba(6,13,22,0.85);
            backdrop-filter: blur(20px) saturate(1.5);
            border-bottom: 1px solid var(--border-dim);
            padding: 0 var(--sp-5);
        }
        .header::after {
            content: '';
            position: absolute; bottom: -1px; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--neon-cyan) 30%, var(--neon-blue) 70%, transparent 100%);
            opacity: 0.4;
        }
        .header-inner {
            max-width: 1600px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 64px; gap: var(--sp-4);
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            border-radius: var(--r-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 16px rgba(0,245,255,0.3);
            flex-shrink: 0;
        }
        .logo-text {
            font-family: var(--font-display);
            font-size: 18px; font-weight: 700;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }
        .header-center { flex: 1; max-width: 500px; margin: 0 auto; }
        .search-wrap { position: relative; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }
        .search-wrap .input { padding-left: 36px; }
        .header-right { display: flex; align-items: center; gap: var(--sp-2); }
        .region-tabs { display: flex; gap: 4px; background: rgba(11,21,35,0.6); border: 1px solid var(--border-dim); border-radius: var(--r-md); padding: 3px; }
        .region-tab { padding: 5px 12px; border-radius: var(--r-sm); border: none; background: transparent; color: var(--text-muted); font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; cursor: pointer; transition: all var(--dur-fast); }
        .region-tab:hover { color: var(--text-primary); }
        .region-tab.active { background: linear-gradient(135deg, rgba(0,245,255,0.2) 0%, rgba(0,128,255,0.15) 100%); color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,245,255,0.15); }
        .theme-toggle { width: 36px; height: 36px; background: rgba(11,21,35,0.6); border: 1px solid var(--border-dim); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: all var(--dur-fast); }
        .theme-toggle:hover { border-color: var(--border-glow); box-shadow: 0 0 10px rgba(0,245,255,0.1); }

        .layout { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 260px 1fr; gap: var(--sp-4); padding: var(--sp-4) var(--sp-5) var(--sp-10); }

        .sidebar { display: flex; flex-direction: column; gap: var(--sp-3); position: sticky; top: 80px; height: calc(100vh - 90px); overflow-y: auto; scrollbar-width: none; }
        .sidebar::-webkit-scrollbar { display: none; }

        .panel { background: var(--bg-glass); border: 1px solid var(--border-dim); border-radius: var(--r-xl); backdrop-filter: blur(16px); overflow: hidden; transition: border-color var(--dur-normal); }
        .panel:hover { border-color: var(--border-glow); }
        .panel-header { padding: 10px var(--sp-4); border-bottom: 1px solid var(--border-dim); background: linear-gradient(90deg, rgba(0,245,255,0.05) 0%, transparent 100%); display: flex; align-items: center; gap: 8px; }
        .panel-header-icon { font-size: 13px; }
        .panel-title { font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--neon-cyan); }
        .panel-body { padding: var(--sp-3); }

        .provider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .provider-btn { padding: 8px 6px; background: rgba(11,21,35,0.6); border: 1px solid var(--border-dim); border-radius: var(--r-md); color: var(--text-secondary); font-family: var(--font-body); font-size: 11px; font-weight: 600; cursor: pointer; transition: all var(--dur-fast); display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
        .provider-btn:hover { background: rgba(0,245,255,0.07); border-color: var(--border-glow); color: var(--text-primary); transform: translateY(-2px); }
        .provider-btn.active { background: linear-gradient(135deg, rgba(0,245,255,0.18) 0%, rgba(0,128,255,0.12) 100%); border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0,245,255,0.15); }
        .provider-btn .icon { font-size: 18px; }

        .type-btns { display: flex; flex-direction: column; gap: 6px; }
        .type-btn { padding: 9px 12px; background: rgba(11,21,35,0.6); border: 1px solid var(--border-dim); border-radius: var(--r-md); color: var(--text-secondary); font-size: 12px; font-weight: 600; cursor: pointer; transition: all var(--dur-fast); display: flex; align-items: center; gap: 8px; text-align: left; }
        .type-btn:hover { border-color: var(--border-glow); color: var(--text-primary); background: rgba(0,245,255,0.05); }
        .type-btn.active { background: linear-gradient(90deg, rgba(0,245,255,0.15) 0%, transparent 100%); border-color: var(--neon-cyan); color: var(--neon-cyan); }

        .genre-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
        .genre-chip { padding: 4px 10px; background: rgba(11,21,35,0.8); border: 1px solid var(--border-dim); border-radius: var(--r-full); color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer; transition: all var(--dur-fast); }
        .genre-chip:hover { border-color: var(--border-glow); color: var(--text-secondary); }
        .genre-chip.active { border-color: var(--neon-purple); color: var(--neon-purple); background: rgba(123,47,255,0.1); box-shadow: 0 0 8px rgba(123,47,255,0.2); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .stat-box { background: rgba(11,21,35,0.6); border: 1px solid var(--border-dim); border-radius: var(--r-md); padding: 10px; text-align: center; }
        .stat-val { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--neon-cyan); line-height: 1; }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 3px; letter-spacing: 0.08em; }

        .main { display: flex; flex-direction: column; gap: var(--sp-4); }

        .toolbar { display: flex; align-items: center; gap: var(--sp-2); flex-wrap: wrap; }
        .toolbar-label { font-family: var(--font-display); font-size: 10px; color: var(--text-muted); letter-spacing: 0.15em; margin-right: 4px; }
        .sort-select { background: rgba(11,21,35,0.8); border: 1px solid var(--border-dim); border-radius: var(--r-md); color: var(--text-secondary); padding: 6px 10px; font-size: 12px; cursor: pointer; outline: none; transition: border-color var(--dur-fast); }
        .sort-select:hover, .sort-select:focus { border-color: var(--border-glow); }
        .view-toggle { display: flex; gap: 4px; background: rgba(11,21,35,0.6); border: 1px solid var(--border-dim); border-radius: var(--r-md); padding: 3px; margin-left: auto; }
        .view-btn { padding: 5px 8px; border: none; background: transparent; border-radius: var(--r-sm); color: var(--text-muted); cursor: pointer; font-size: 14px; transition: all var(--dur-fast); }
        .view-btn.active { background: rgba(0,245,255,0.15); color: var(--neon-cyan); }
        .results-label { font-size: 11px; color: var(--text-muted); padding: 4px 0; }
        .results-label span { color: var(--neon-cyan); font-weight: 600; }

        .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border-dim); padding-bottom: 0; margin-bottom: -4px; }
        .tab-btn { padding: 8px 16px; background: transparent; border: none; font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all var(--dur-fast); }
        .tab-btn:hover { color: var(--text-secondary); }
        .tab-btn.active { color: var(--neon-cyan); border-bottom-color: var(--neon-cyan); }
        .tab-badge { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background: rgba(0,245,255,0.15); color: var(--neon-cyan); border-radius: var(--r-full); font-size: 9px; font-weight: 700; margin-left: 5px; }

        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: var(--sp-4); }
        .media-grid.list-view { grid-template-columns: 1fr; }

        .card { background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: var(--r-xl); overflow: hidden; cursor: pointer; transition: all var(--dur-normal) var(--ease); position: relative; }
        .card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,245,255,0.04) 0%, transparent 60%); opacity: 0; transition: opacity var(--dur-normal); pointer-events: none; z-index: 1; }
        .card:hover { transform: translateY(-6px) scale(1.01); border-color: rgba(0,245,255,0.35); box-shadow: 0 20px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,245,255,0.1), var(--glow-cyan); background: var(--bg-card-hover); }
        .card:hover::before { opacity: 1; }

        .card-poster { width: 100%; aspect-ratio: 2 / 3; background: linear-gradient(135deg, #0b1d30 0%, #060d16 100%); display: flex; align-items: center; justify-content: center; font-size: 52px; position: relative; overflow: hidden; }
        .card-poster img { width: 100%; height: 100%; object-fit: cover; }
        .card-poster-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(6,13,22,0.95) 100%); }
        .card-type-badge { position: absolute; top: 10px; left: 10px; z-index: 2; padding: 3px 8px; background: rgba(6,13,22,0.85); border: 1px solid var(--border-dim); border-radius: var(--r-full); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); backdrop-filter: blur(8px); }
        .card-fav-btn { position: absolute; top: 8px; right: 8px; z-index: 3; width: 28px; height: 28px; background: rgba(6,13,22,0.8); border: 1px solid var(--border-dim); border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; transition: all var(--dur-fast); backdrop-filter: blur(8px); opacity: 0; }
        .card:hover .card-fav-btn { opacity: 1; }
        .card-fav-btn.active { opacity: 1; border-color: var(--neon-pink); color: var(--neon-pink); }
        .card-body { padding: var(--sp-3); position: relative; z-index: 2; }
        .card-title { font-size: 13px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .card-year { font-size: 11px; color: var(--text-muted); }
        .card-rating { display: flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; color: var(--neon-gold); }
        .card-providers { display: flex; flex-wrap: wrap; gap: 4px; }
        .badge { width: 24px; height: 24px; background: rgba(0,245,255,0.07); border: 1px solid var(--border-dim); border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all var(--dur-fast); }
        .badge:hover { background: rgba(0,245,255,0.15); border-color: var(--border-glow); transform: scale(1.1); }

        .card.list-card { display: flex; align-items: center; gap: var(--sp-3); border-radius: var(--r-lg); }
        .card.list-card:hover { transform: translateX(4px) translateY(0); }
        .card.list-card .card-poster { width: 60px; height: 90px; flex-shrink: 0; border-radius: var(--r-md) 0 0 var(--r-md); font-size: 28px; aspect-ratio: unset; }
        .card.list-card .card-body { flex: 1; padding: var(--sp-2) var(--sp-3); display: flex; align-items: center; gap: var(--sp-3); }
        .card.list-card .card-info { flex: 1; min-width: 0; }
        .card.list-card .card-title { font-size: 14px; white-space: unset; }
        .card.list-card .card-overview-short { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; margin-top: 3px; }
        .card.list-card .card-poster-overlay, .card.list-card .card-type-badge, .card.list-card .card-fav-btn { display: none; }

        .state-box { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--sp-3); padding: var(--sp-10); color: var(--text-muted); text-align: center; }
        .state-icon { font-size: 48px; opacity: 0.4; }
        .state-title { font-family: var(--font-display); font-size: 14px; color: var(--text-secondary); letter-spacing: 0.1em; }
        .state-sub { font-size: 12px; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(2,4,8,0.85); backdrop-filter: blur(8px) saturate(0.8); z-index: 500; align-items: center; justify-content: center; padding: var(--sp-4); }
        .overlay.open { display: flex; animation: fadeIn var(--dur-normal) var(--ease); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal { background: linear-gradient(160deg, #0e1c2e 0%, #080f1a 100%); border: 1px solid var(--border-glow); border-radius: var(--r-xl); width: 100%; max-width: 680px; max-height: 88vh; overflow-y: auto; scrollbar-width: thin; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.7), var(--glow-blue); animation: slideUp var(--dur-slow) var(--ease); }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-top { display: flex; gap: var(--sp-5); padding: var(--sp-6); background: linear-gradient(135deg, rgba(0,128,255,0.06) 0%, transparent 60%); border-bottom: 1px solid var(--border-dim); position: relative; }
        .modal-poster { width: 130px; height: 195px; flex-shrink: 0; background: linear-gradient(135deg, #0b1d30, #060d16); border-radius: var(--r-lg); border: 1px solid var(--border-glow); display: flex; align-items: center; justify-content: center; font-size: 52px; overflow: hidden; box-shadow: var(--glow-blue); }
        .modal-close { position: absolute; top: var(--sp-4); right: var(--sp-4); width: 32px; height: 32px; background: rgba(11,21,35,0.8); border: 1px solid var(--border-dim); border-radius: var(--r-md); color: var(--text-muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--dur-fast); }
        .modal-close:hover { border-color: var(--neon-pink); color: var(--neon-pink); }
        .modal-info { flex: 1; min-width: 0; }
        .modal-title { font-family: var(--font-display); font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #e8f4ff 0%, var(--neon-cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 0.03em; line-height: 1.2; margin-bottom: var(--sp-2); }
        .modal-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: var(--sp-3); }
        .chip { padding: 3px 10px; border-radius: var(--r-full); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; }
        .chip-blue { background: rgba(0,128,255,0.15); border: 1px solid rgba(0,128,255,0.3); color: #60a5fa; }
        .chip-purple { background: rgba(123,47,255,0.15); border: 1px solid rgba(123,47,255,0.3); color: #a78bfa; }
        .chip-gold { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.25); color: var(--neon-gold); }

        .modal-rating { display: flex; align-items: center; gap: 8px; margin-bottom: var(--sp-3); }
        .rating-val { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--neon-gold); }
        .rating-sub { font-size: 11px; color: var(--text-muted); }
        .modal-overview { font-size: 13px; line-height: 1.7; color: var(--text-secondary); margin-bottom: var(--sp-3); }
        .modal-actions { display: flex; gap: var(--sp-2); align-items: center; }
        .modal-body { padding: var(--sp-5) var(--sp-6); }
        .section-title { font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--neon-cyan); margin-bottom: var(--sp-3); display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-glow) 0%, transparent 100%); }

        .provider-list { display: flex; flex-direction: column; gap: 8px; }
        .provider-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: rgba(11,21,35,0.7); border: 1px solid var(--border-dim); border-radius: var(--r-lg); transition: all var(--dur-fast); }
        .provider-row:hover { border-color: var(--border-glow); background: rgba(0,245,255,0.04); }
        .provider-row-left { display: flex; align-items: center; gap: 10px; }
        .provider-row-icon { width: 36px; height: 36px; background: rgba(0,245,255,0.07); border: 1px solid var(--border-dim); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .provider-row-name { font-weight: 700; font-size: 13px; }
        .provider-row-type { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
        .provider-row-right { display: flex; align-items: center; gap: 8px; }
        .avail-badge { padding: 2px 8px; border-radius: var(--r-full); font-size: 10px; font-weight: 600; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.25); color: var(--neon-green); }

        .watchlist-panel { display: flex; flex-direction: column; gap: 6px; }
        .watchlist-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: rgba(11,21,35,0.6); border: 1px solid var(--border-dim); border-radius: var(--r-md); cursor: pointer; transition: all var(--dur-fast); font-size: 12px; }
        .watchlist-item:hover { border-color: var(--border-glow); }
        .watchlist-item-icon { font-size: 20px; }
        .watchlist-item-info { flex: 1; min-width: 0; }
        .watchlist-item-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .watchlist-item-sub { font-size: 10px; color: var(--text-muted); }
        .watchlist-remove { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; padding: 2px 4px; border-radius: var(--r-sm); transition: color var(--dur-fast); }
        .watchlist-remove:hover { color: var(--neon-pink); }

        .toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { background: rgba(14,28,46,0.95); border: 1px solid var(--border-glow); border-radius: var(--r-lg); padding: 12px 16px; font-size: 13px; color: var(--text-primary); max-width: 280px; box-shadow: var(--glow-blue); backdrop-filter: blur(16px); animation: toastIn var(--dur-normal) var(--ease); display: flex; align-items: center; gap: 8px; }
        @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.out { animation: toastOut var(--dur-normal) var(--ease) forwards; }
        @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }
        .toast-icon { font-size: 16px; flex-shrink: 0; }

        body.light {
            --bg-deep: #f0f4f8; --bg-base: #e8edf3; --bg-surface: #dde3ec;
            --bg-card: #d4dce8; --bg-card-hover: #cad3e2;
            --bg-glass: rgba(212,220,232,0.85);
            --text-primary: #0a1628; --text-secondary: #2a4060; --text-muted: #5a7090;
            --border-dim: rgba(0,80,180,0.12); --border-glow: rgba(0,80,180,0.3); --border-hot: rgba(0,80,180,0.6);
            --neon-cyan: #0060cc; --neon-gold: #b07000; --neon-green: #007744; --neon-pink: #cc0060;
        }
        body.light .header { background: rgba(232,237,243,0.9); }

        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { position: static; height: auto; overflow-y: visible; flex-direction: row; flex-wrap: wrap; }
            .panel { flex: 1 1 220px; }
            .header-center { display: none; }
        }
        @media (max-width: 600px) {
            .media-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .modal-top { flex-direction: column; align-items: center; text-align: center; }
            .modal-poster { width: 100px; height: 150px; }
        }
    </style>
</head>

<header class="header">
    <div class="header-inner">

                    <div class="stat-box"><div class="stat-val" id="statFavs">0</div><div class="stat-label">FAVORITES</div></div>

            <div class="panel-header"><span class="panel-header-icon">📋</span><span class="panel-title font-display">Watchlist</span></div>
            <div class="panel-body"><div class="watchlist-panel" id="watchlistItems"></div></div>

    <main class="main">

                <option value="default">Default</option>
                <option value="rating-desc">Rating ↓</option>

        <div class="media-grid" id="mediaGrid"></div>

</div>

<div class="overlay" id="overlay">
    <div class="modal" id="modal">
        <button class="modal-close" id="modalClose">✕</button>
        <div class="modal-top">
            <div class="modal-poster" id="modalPoster"></div>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-chips" id="modalChips"></div>
                <div class="modal-rating">
                    <div class="rating-val" id="modalRating">—</div>
                    <div><div class="rating-stars" id="modalStars"></div><div class="rating-sub">IMDb Rating</div></div>
                </div>
                <div class="modal-overview" id="modalOverview"></div>
                <div class="modal-actions">
                    <button class="btn-fav" id="modalFavBtn" title="Favorite">♡</button>
                    <button class="btn btn-ghost" id="modalWatchlistBtn">+ Watchlist</button>
                </div>
            </div>
        </div>
        <div class="modal-body">
            <div class="section-title font-display">Available On</div>
            <div class="provider-list" id="modalProviders"></div>
        </div>
    </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
const PROVIDERS = {
    US: [
        { id:'netflix', name:'Netflix', icon:'🔴' },
        { id:'prime', name:'Prime', icon:'▶️' },
        { id:'disney', name:'Disney+', icon:'✨' },
        { id:'hbo', name:'Max', icon:'🎭' },
        { id:'hulu', name:'Hulu', icon:'🟢' },
        { id:'apple', name:'Apple TV+', icon:'🍎' },
        { id:'paramount', name:'Paramount+', icon:'⭐' },
        { id:'youtube', name:'YouTube', icon:'📹' },
    ],
    IL: [
        { id:'netflix', name:'Netflix', icon:'🔴' },
        { id:'yes', name:'YES+', icon:'📡' },
        { id:'hot', name:'HOT', icon:'🔥' },
        { id:'cellcom', name:'Cellcom TV', icon:'📱' },
        { id:'youtube', name:'YouTube', icon:'📹' },
        { id:'apple', name:'Apple TV+', icon:'🍎' },
    ],
    UK: [
        { id:'netflix', name:'Netflix', icon:'🔴' },
        { id:'prime', name:'Prime', icon:'▶️' },
        { id:'disney', name:'Disney+', icon:'✨' },
        { id:'bbc', name:'BBC iPlayer', icon:'🇬🇧' },
        { id:'itv', name:'ITVX', icon:'🎬' },
        { id:'apple', name:'Apple TV+', icon:'🍎' },
        { id:'sky', name:'Sky Go', icon:'☁️' },
    ],
};

const MEDIA = [
    { id:1, title:'The Crown', year:2023, rating:8.5, type:'tv', genres:['Drama','History'], providers:{US:['netflix'],IL:['netflix'],UK:['netflix']}, poster:'👑', overview:'The tumultuous story of the British royal family across decades of change, scandal, and triumph.' },
    { id:2, title:'Dune: Part Two', year:2024, rating:8.8, type:'movie', genres:['Sci-Fi','Adventure'], providers:{US:['prime','hbo'],IL:['netflix'],UK:['prime','sky']}, poster:'🪐', overview:'Paul Atreides unites with Chani and the Fremen while seeking revenge against the conspirators who destroyed his family.' },
    { id:3, title:'Succession', year:2023, rating:9.0, type:'tv', genres:['Drama','Comedy'], providers:{US:['hbo'],IL:['yes'],UK:['sky','bbc']}, poster:'🏢', overview:'The Roy family struggles with power, succession, and the soul of their global media empire.' },
    { id:4, title:'Oppenheimer', year:2023, rating:8.4, type:'movie', genres:['Drama','History'], providers:{US:['netflix'],IL:['netflix'],UK:['netflix','bbc']}, poster:'☢️', overview:'The story of J. Robert Oppenheimer and the race to build the atomic bomb during World War II.' },
    { id:5, title:'The Last of Us', year:2023, rating:8.9, type:'tv', genres:['Drama','Horror','Sci-Fi'], providers:{US:['hbo'],IL:['yes'],UK:['sky']}, poster:'🧟', overview:'A hardened survivor and a smuggled teenager must survive a post-apocalyptic world ravaged by a fungal pandemic.' },
    { id:6, title:'Barbie', year:2023, rating:7.9, type:'movie', genres:['Comedy','Fantasy'], providers:{US:['hbo','netflix'],IL:['netflix'],UK:['sky','netflix']}, poster:'💗', overview:'Barbie and Ken go on an unexpected adventure into the real world after an existential crisis in Barbieland.' },
    { id:7, title:'Wednesday', year:2022, rating:8.1, type:'tv', genres:['Horror','Comedy','Mystery'], providers:{US:['netflix'],IL:['netflix'],UK:['netflix']}, poster:'💛', overview:'Wednesday Addams navigates life at Nevermore Academy while uncovering supernatural mysteries.' },
    { id:8, title:'Killers of the Flower Moon', year:2023, rating:8.3, type:'movie', genres:['Drama','Crime','History'], providers:{US:['apple','prime'],IL:['apple'],UK:['apple','prime']}, poster:'🌻', overview:"FBI investigation into the systematic murders of Osage Nation members during Oklahoma's oil boom." },
    { id:9, title:'Shogun', year:2024, rating:9.1, type:'tv', genres:['Drama','History','Action'], providers:{US:['disney'],IL:['disney'],UK:['disney']}, poster:'⚔️', overview:'An English navigator lands in feudal Japan and becomes embroiled in a struggle for power.' },
    { id:10, title:'Fallout', year:2024, rating:8.5, type:'tv', genres:['Sci-Fi','Action','Comedy'], providers:{US:['prime'],IL:['prime'],UK:['prime']}, poster:'☢️', overview:'A nuclear war survivor emerges from an underground vault 200 years later into a transformed, dangerous world.' },
    { id:11, title:'Poor Things', year:2023, rating:8.1, type:'movie', genres:['Comedy','Romance','Sci-Fi'], providers:{US:['hulu','disney'],IL:['yes'],UK:['disney','bbc']}, poster:'🧠', overview:'A young woman brought back to life embarks on an adventure across continents.' },
    { id:12, title:'House of the Dragon', year:2024, rating:8.5, type:'tv', genres:['Drama','Fantasy','Action'], providers:{US:['hbo'],IL:['yes','hot'],UK:['sky']}, poster:'🐉', overview:'The story of House Targaryen, set 200 years before the events of Game of Thrones.' },
    { id:13, title:'Civil War', year:2024, rating:7.8, type:'movie', genres:['Action','Drama','Thriller'], providers:{US:['prime'],IL:['prime'],UK:['prime']}, poster:'🎖', overview:'A team of journalists travel across a war-torn America during a second civil war.' },
    { id:14, title:'Severance', year:2023, rating:8.7, type:'tv', genres:['Sci-Fi','Drama','Thriller'], providers:{US:['apple'],IL:['apple'],UK:['apple']}, poster:'🧩', overview:'Employees undergo a procedure that separates their work and personal memories, with disturbing consequences.' },
    { id:15, title:'Alien: Romulus', year:2024, rating:7.6, type:'movie', genres:['Horror','Sci-Fi'], providers:{US:['hulu','disney'],IL:['yes'],UK:['disney']}, poster:'👽', overview:'A group of young colonists discover a derelict space station with a terrifying secret.' },
    { id:16, title:'The Bear', year:2023, rating:8.9, type:'tv', genres:['Drama','Comedy'], providers:{US:['hulu'],IL:['yes'],UK:['disney']}, poster:'🐻', overview:'A fine-dining chef returns home to run his family sandwich shop after a tragic loss.' },
];

const ALL_GENRES = [...new Set(MEDIA.flatMap(m => m.genres))].sort();

const state = {
    region: 'US', providers: new Set(), type: 'all', genre: null,
    search: '', sort: 'default', tab: 'all', view: 'grid',
    favorites: new Set(JSON.parse(localStorage.getItem('sh_favs') || '[]')),
    watchlist: new Set(JSON.parse(localStorage.getItem('sh_wl') || '[]')),
    theme: localStorage.getItem('sh_theme') || 'dark',
    activeItem: null,
};

function save() {
    localStorage.setItem('sh_favs', JSON.stringify([...state.favorites]));
    localStorage.setItem('sh_wl', JSON.stringify([...state.watchlist]));
    localStorage.setItem('sh_theme', state.theme);
}

function providerFor(id) { return (PROVIDERS[state.region] || PROVIDERS.US).find(p => p.id === id); }
function availProviders(item) { return (item.providers[state.region] || []).map(id => providerFor(id)).filter(Boolean); }
function stars(r) { const f = Math.round(r/2); return '★'.repeat(f) + '☆'.repeat(5-f); }

function getFiltered() {
    let data = MEDIA;
    if (state.tab === 'favorites') data = data.filter(m => state.favorites.has(m.id));
    if (state.tab === 'watchlist') data = data.filter(m => state.watchlist.has(m.id));
    if (state.providers.size > 0) data = data.filter(m => (m.providers[state.region]||[]).some(p => state.providers.has(p)));
    if (state.type !== 'all') data = data.filter(m => m.type === state.type);
    if (state.genre) data = data.filter(m => m.genres.includes(state.genre));
    if (state.search) { const q = state.search.toLowerCase(); data = data.filter(m => m.title.toLowerCase().includes(q) || m.overview.toLowerCase().includes(q) || m.genres.some(g => g.toLowerCase().includes(q))); }
    const s = [...data];
    if (state.sort === 'rating-desc') s.sort((a,b)=>b.rating-a.rating);
    else if (state.sort === 'rating-asc') s.sort((a,b)=>a.rating-b.rating);
    else if (state.sort === 'year-desc') s.sort((a,b)=>b.year-a.year);
    else if (state.sort === 'year-asc') s.sort((a,b)=>a.year-b.year);
    else if (state.sort === 'title-asc') s.sort((a,b)=>a.title.localeCompare(b.title));
    return s;
}

function render() { renderProviders(); renderGenres(); renderMedia(); renderWatchlist(); renderStats(); renderTabBadges(); }

function renderProviders() {
    const list = PROVIDERS[state.region] || PROVIDERS.US;
    document.getElementById('providerGrid').innerHTML = list.map(p =>
        `<button class="provider-btn ${state.providers.has(p.id)?'active':''}" data-pid="${p.id}"><span class="icon">${p.icon}</span><span>${p.name}</span></button>`
    ).join('');
}

function renderGenres() {
    document.getElementById('genreWrap').innerHTML = ALL_GENRES.map(g =>
        `<button class="genre-chip ${state.genre===g?'active':''}" data-genre="${g}">${g}</button>`
    ).join('');
}

function renderMedia() {
    const grid = document.getElementById('mediaGrid');
    const data = getFiltered();
    document.getElementById('resultsLabel').innerHTML = `<span>${data.length}</span> result${data.length!==1?'s':''}`;
    if (!data.length) { grid.innerHTML = `<div class="state-box"><div class="state-icon">🔭</div><div class="state-title font-display">No Results Found</div><div class="state-sub">Try adjusting your filters or search query</div></div>`; return; }
    grid.className = 'media-grid' + (state.view==='list'?' list-view':'');
    grid.innerHTML = data.map(m => {
        const ps = availProviders(m);
        const isFav = state.favorites.has(m.id);
        if (state.view === 'list') return `<div class="card list-card" data-id="${m.id}"><div class="card-poster">${m.poster}</div><div class="card-body"><div class="card-info"><div class="card-title">${m.title}</div><div class="card-overview-short">${m.overview}</div><div class="card-meta" style="margin-top:4px"><span class="card-year">${m.year} · ${m.type.toUpperCase()}</span><span class="card-rating">⭐ ${m.rating}</span></div></div><div class="card-providers">${ps.map(p=>`<div class="badge" title="${p.name}">${p.icon}</div>`).join('')}</div></div></div>`;
        return `<div class="card" data-id="${m.id}"><div class="card-poster">${m.poster}<div class="card-poster-overlay"></div><div class="card-type-badge">${m.type==='movie'?'🎥 MOVIE':'📺 SHOW'}</div><button class="card-fav-btn ${isFav?'active':''}" data-fav="${m.id}">${isFav?'♥':'♡'}</button></div><div class="card-body"><div class="card-title">${m.title}</div><div class="card-meta"><span class="card-year">${m.year}</span><span class="card-rating">⭐ ${m.rating}</span></div><div class="card-providers">${ps.map(p=>`<div class="badge" title="${p.name}">${p.icon}</div>`).join('')}</div></div></div>`;
    }).join('');
}

function renderWatchlist() {
    const wlItems = MEDIA.filter(m => state.watchlist.has(m.id));
    document.getElementById('watchlistPanel').style.display = wlItems.length ? '' : 'none';
    document.getElementById('watchlistItems').innerHTML = wlItems.map(m =>
        `<div class="watchlist-item" data-id="${m.id}"><div class="watchlist-item-icon">${m.poster}</div><div class="watchlist-item-info"><div class="watchlist-item-title">${m.title}</div><div class="watchlist-item-sub">${m.year} · ⭐ ${m.rating}</div></div><button class="watchlist-remove" data-wlr="${m.id}">✕</button></div>`
    ).join('');
}

function renderStats() {
    document.getElementById('statTotal').textContent = MEDIA.length;
    document.getElementById('statShowing').textContent = getFiltered().length;
    document.getElementById('statFavs').textContent = state.favorites.size;
    document.getElementById('statWatchlist').textContent = state.watchlist.size;
}

function renderTabBadges() {
    document.getElementById('favCount').textContent = state.favorites.size;
    document.getElementById('wlCount').textContent = state.watchlist.size;
}

function openModal(id) {
    const m = MEDIA.find(x => x.id === id); if (!m) return;
    state.activeItem = m;
    document.getElementById('modalPoster').textContent = m.poster;
    document.getElementById('modalTitle').textContent = m.title;
    document.getElementById('modalOverview').textContent = m.overview;
    document.getElementById('modalRating').textContent = m.rating;
    document.getElementById('modalStars').textContent = stars(m.rating);
    document.getElementById('modalChips').innerHTML = [
        `<span class="chip chip-blue">${m.year}</span>`,
        `<span class="chip chip-purple">${m.type==='movie'?'🎥 Movie':'📺 TV Show'}</span>`,
        ...m.genres.map(g=>`<span class="chip chip-gold">${g}</span>`),
        `<span class="chip chip-green">${state.region}</span>`,
    ].join('');
    const favBtn = document.getElementById('modalFavBtn');
    const wlBtn = document.getElementById('modalWatchlistBtn');
    favBtn.textContent = state.favorites.has(m.id) ? '♥' : '♡';
    favBtn.classList.toggle('active', state.favorites.has(m.id));
    wlBtn.textContent = state.watchlist.has(m.id) ? '✓ In Watchlist' : '+ Watchlist';
    const ps = availProviders(m);
    document.getElementById('modalProviders').innerHTML = ps.length
        ? ps.map(p=>`<div class="provider-row"><div class="provider-row-left"><div class="provider-row-icon">${p.icon}</div><div><div class="provider-row-name">${p.name}</div><div class="provider-row-type">Subscription · ${state.region}</div></div></div><div class="provider-row-right"><span class="avail-badge">Available</span><button class="btn-watch" onclick="handleWatch('${p.name}')">▶ Watch</button></div></div>`).join('')
        : `<div style="color:var(--text-muted);font-size:12px">Not available in ${state.region} region.</div>`;
    document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); state.activeItem = null; }

function toggleFav(id) {
    if (state.favorites.has(id)) { state.favorites.delete(id); toast('Removed from favorites','\u2661'); }
    else { state.favorites.add(id); toast('Added to favorites!','\u2665'); }
    save(); render(); if (state.activeItem?.id === id) openModal(id);
}

function toggleWatchlist(id) {
    if (state.watchlist.has(id)) { state.watchlist.delete(id); toast('Removed from watchlist','\ud83d\udccb'); }
    else { state.watchlist.add(id); toast('Added to watchlist!','\u2705'); }
    save(); render(); if (state.activeItem?.id === id) openModal(id);
}

function handleWatch(provider) { toast(`Opening ${provider}\u2026 search for \"${state.activeItem?.title||'content'}\"`,'▶'); }

function toast(msg, icon='✨') {
    const wrap = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<span class="toast-icon">${icon}</span><span>${msg}</span>`;
    wrap.appendChild(el);
    setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 2800);
}

document.addEventListener('click', e => {
    const pbtn = e.target.closest('[data-pid]'); if (pbtn) { const pid=pbtn.dataset.pid; state.providers.has(pid)?state.providers.delete(pid):state.providers.add(pid); render(); return; }
    const tbtn = e.target.closest('[data-type]'); if (tbtn) { document.querySelectorAll('[data-type]').forEach(b=>b.classList.remove('active')); tbtn.classList.add('active'); state.type=tbtn.dataset.type; render(); return; }
    const gbtn = e.target.closest('[data-genre]'); if (gbtn) { state.genre=state.genre===gbtn.dataset.genre?null:gbtn.dataset.genre; render(); return; }
    const rbtn = e.target.closest('[data-region]'); if (rbtn) { document.querySelectorAll('[data-region]').forEach(b=>b.classList.remove('active')); rbtn.classList.add('active'); state.region=rbtn.dataset.region; state.providers.clear(); render(); return; }
    const tab = e.target.closest('[data-tab]'); if (tab) { document.querySelectorAll('[data-tab]').forEach(b=>b.classList.remove('active')); tab.classList.add('active'); state.tab=tab.dataset.tab; render(); return; }
    const favBtn = e.target.closest('[data-fav]'); if (favBtn) { e.stopPropagation(); toggleFav(+favBtn.dataset.fav); return; }
    const wlr = e.target.closest('[data-wlr]'); if (wlr) { e.stopPropagation(); toggleWatchlist(+wlr.dataset.wlr); return; }
    const wli = e.target.closest('.watchlist-item'); if (wli && !e.target.closest('[data-wlr]')) { openModal(+wli.dataset.id); return; }
    const card = e.target.closest('.card[data-id]'); if (card && !e.target.closest('[data-fav]')) { openModal(+card.dataset.id); return; }
    if (e.target.id==='overlay') { closeModal(); return; }
    if (e.target.id==='modalClose') { closeModal(); return; }
    if (e.target.id==='modalFavBtn') { toggleFav(state.activeItem.id); return; }
    if (e.target.id==='modalWatchlistBtn') { toggleWatchlist(state.activeItem.id); return; }
    if (e.target.id==='viewGrid') { state.view='grid'; document.getElementById('viewGrid').classList.add('active'); document.getElementById('viewList').classList.remove('active'); render(); return; }
    if (e.target.id==='viewList') { state.view='list'; document.getElementById('viewList').classList.add('active'); document.getElementById('viewGrid').classList.remove('active'); render(); return; }
    const tt = e.target.closest('#themeToggle'); if (tt) { state.theme=state.theme==='dark'?'light':'dark'; document.body.classList.toggle('light',state.theme==='light'); tt.textContent=state.theme==='light'?'🌞':'🌙'; save(); return; }
});

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => { clearTimeout(searchTimer); searchTimer = setTimeout(() => { state.search=e.target.value.trim(); render(); }, 200); });
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key==='Escape') { e.target.value=''; state.search=''; render(); } });
document.getElementById('sortSelect').addEventListener('change', e => { state.sort=e.target.value; render(); });
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

if (state.theme==='light') { document.body.classList.add('light'); document.getElementById('themeToggle').textContent='🌞'; }
render();
</script>
</body>
</html>
